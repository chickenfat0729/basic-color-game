<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>顏色學習遊戲 🎨</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#f7f3ff;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;}
#root{width:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;}

#game-screen{display:flex;flex-direction:column;height:100dvh;max-height:100dvh;overflow:hidden;padding:10px 12px 6px;}
#top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-shrink:0;gap:6px;}
#level-badge{font-size:14px;font-weight:700;color:#534AB7;background:#EEEDFE;border-radius:99px;padding:5px 14px;white-space:nowrap;}
#top-btns{display:flex;gap:6px;}
#skip-btn,#mute-btn{font-size:12px;color:#aaa;background:#fff;border:1px solid #ddd;border-radius:99px;padding:5px 12px;cursor:pointer;white-space:nowrap;}
#mute-btn.muted{color:#E24B4A;border-color:#E24B4A;}

#score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0;}
#prog{font-size:13px;color:#888;}
#score-disp{font-size:14px;font-weight:700;color:#534AB7;}

#timer-wrap{flex-shrink:0;margin-bottom:8px;}
#timer-track{height:12px;background:#ede9ff;border-radius:99px;overflow:hidden;}
#timer-bar{height:100%;width:100%;background:#7F77DD;border-radius:99px;transition:width 0.1s linear,background 0.3s;}

#listen-btn{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 0;border-radius:18px;border:none;cursor:pointer;background:#7F77DD;color:#fff;font-size:20px;font-weight:700;margin-bottom:6px;}
#listen-btn.pulse{animation:lpulse 0.5s ease-out;}
@keyframes lpulse{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}

#color-word{flex-shrink:0;font-size:26px;font-weight:700;color:#3C3489;text-align:center;min-height:36px;margin-bottom:3px;letter-spacing:2px;}
#hint{flex-shrink:0;font-size:13px;text-align:center;color:#888;min-height:18px;margin-bottom:5px;}

#choices{flex:1;display:grid;gap:8px;min-height:0;}
.cbtn{border-radius:16px;border:4px solid transparent;width:100%;height:100%;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;transition:transform 0.1s;-webkit-tap-highlight-color:transparent;}
.cbtn:active{transform:scale(0.95);}
.cbtn span{font-size:15px;font-weight:700;background:rgba(255,255,255,0.82);border-radius:10px;padding:4px 12px;color:rgba(0,0,0,0.65);}
.cbtn.selected{border-color:#534AB7;transform:scale(1.03);}
.cbtn.correct{border-color:#1D9E75;animation:cbounce 0.4s;}
.cbtn.wrong{border-color:#E24B4A;animation:cshake 0.35s;}
.cbtn.reveal{border-color:#1D9E75;}
.cbtn.missed{border-color:#BA7517;}
@keyframes cbounce{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes cshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

#bottom-area{flex-shrink:0;padding-top:5px;}
#confirm-btn{display:none;width:100%;padding:16px;border-radius:18px;border:none;cursor:pointer;background:#1D9E75;color:#fff;font-size:20px;font-weight:700;margin-bottom:5px;-webkit-tap-highlight-color:transparent;}
#feedback{text-align:center;font-size:17px;font-weight:700;min-height:30px;line-height:30px;}
#feedback.good{color:#1D9E75;}#feedback.bad{color:#E24B4A;}#feedback.timeout{color:#BA7517;}

/* Result */
#result-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px 16px;background:#f7f3ff;}
#animal-stage{width:100%;max-width:260px;height:240px;margin-bottom:10px;}
#animal-svg{width:100%;height:100%;}
#result-msg{font-size:28px;font-weight:700;color:#3C3489;margin-bottom:5px;text-align:center;}
#result-sub{font-size:16px;color:#888;margin-bottom:22px;text-align:center;}
#result-btns{display:flex;gap:14px;width:100%;max-width:320px;}
.rbtn{flex:1;padding:16px 8px;border-radius:18px;border:none;font-size:17px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
#retry-btn{background:#fff;color:#534AB7;border:2px solid #EEEDFE;}
#next-lv-btn{background:#7F77DD;color:#fff;}

/* Final */
#final-screen{display:none;flex-direction:column;align-items:center;padding:20px 16px;background:#f7f3ff;min-height:100dvh;}
#fw-canvas{width:100%;height:180px;border-radius:16px;background:#1a1040;margin-bottom:14px;display:block;}
#final-title{font-size:22px;font-weight:700;color:#3C3489;margin-bottom:14px;text-align:center;}
#score-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:15px;background:#fff;border-radius:16px;overflow:hidden;}
#score-table th{background:#EEEDFE;color:#534AB7;padding:10px;font-weight:700;}
#score-table td{padding:10px;border-bottom:1px solid #f0eeff;color:#444;text-align:center;}
#score-table tr:last-child td{font-weight:700;color:#534AB7;background:#f9f7ff;}
#play-again-btn{width:100%;max-width:320px;padding:18px;background:#7F77DD;color:#fff;border:none;border-radius:18px;font-size:20px;font-weight:700;cursor:pointer;}

/* Animal animations */
.gorilla-chest{animation:gchest 0.35s ease-in-out infinite alternate;}
@keyframes gchest{0%{transform:scaleX(1)}100%{transform:scaleX(1.07)}}
.gorilla-arm-l{transform-origin:38px 78px;animation:garml 0.35s ease-in-out infinite alternate;}
@keyframes garml{0%{transform:rotate(-35deg)}100%{transform:rotate(15deg)}}
.gorilla-arm-r{transform-origin:92px 78px;animation:garmr 0.35s ease-in-out infinite alternate;}
@keyframes garmr{0%{transform:rotate(35deg)}100%{transform:rotate(-15deg)}}
.lion-group{animation:lionb 0.5s ease-in-out infinite alternate;}
@keyframes lionb{0%{transform:translateY(0)}100%{transform:translateY(-8px)}}
.roar-wave{animation:rwave 0.55s ease-out infinite;}
@keyframes rwave{0%{transform:scale(0.4);opacity:1}100%{transform:scale(2);opacity:0}}
.clap-l{transform-origin:28px 92px;animation:clapl 0.4s ease-in-out infinite alternate;}
@keyframes clapl{0%{transform:rotate(-28deg)}100%{transform:rotate(5deg)}}
.clap-r{transform-origin:102px 92px;animation:clapr 0.4s ease-in-out infinite alternate;}
@keyframes clapr{0%{transform:rotate(28deg)}100%{transform:rotate(-5deg)}}
.bounce{animation:abounce 0.48s ease-in-out infinite alternate;}
@keyframes abounce{0%{transform:translateY(0)}100%{transform:translateY(-10px)}}
.sad-tear{animation:stear 1.4s ease-in infinite;}
@keyframes stear{0%{transform:translateY(0);opacity:0.9}100%{transform:translateY(22px);opacity:0}}
</style>
</head>
<body>
<div id="root">

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="top-row">
    <span id="level-badge">第 1 關</span>
    <div id="top-btns">
      <button id="skip-btn" onclick="skipLevel()">跳下一關 ▶</button>
      <button id="mute-btn" onclick="toggleMute()">🔊 聲音</button>
    </div>
  </div>
  <div id="score-row">
    <span id="prog">1 / 6</span>
    <span id="score-disp">0 分</span>
  </div>
  <div id="timer-wrap"><div id="timer-track"><div id="timer-bar"></div></div></div>
  <button id="listen-btn" onclick="speakNow()">🔊 點我聽聲音！</button>
  <div id="color-word"></div>
  <div id="hint"></div>
  <div id="choices"></div>
  <div id="bottom-area">
    <button id="confirm-btn" onclick="confirmMulti()">✔ 確認答案</button>
    <div id="feedback"></div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div id="animal-stage"><svg id="animal-svg" viewBox="0 0 130 140"></svg></div>
  <div id="result-msg"></div>
  <div id="result-sub"></div>
  <div id="result-btns">
    <button class="rbtn" id="retry-btn" onclick="retryLevel()">🔁 再挑戰</button>
    <button class="rbtn" id="next-lv-btn" onclick="goNextLevel()">下一關 ▶</button>
  </div>
</div>

<!-- FINAL SCREEN -->
<div id="final-screen">
  <canvas id="fw-canvas"></canvas>
  <div id="final-title">🎆 恭喜完成所有關卡！</div>
  <table id="score-table">
    <thead><tr><th>關卡</th><th>答對</th><th>總題</th></tr></thead>
    <tbody id="score-tbody"></tbody>
  </table>
  <button id="play-again-btn" onclick="startGame()">🔄 再玩一次</button>
</div>

</div>
<script>
/* ── Data ── */
const COLORS=[
  {en:'red',zh:'紅色',hex:'#E24B4A'},
  {en:'blue',zh:'藍色',hex:'#378ADD'},
  {en:'green',zh:'綠色',hex:'#4a9a40'},
  {en:'yellow',zh:'黃色',hex:'#EF9F27'},
  {en:'orange',zh:'橘色',hex:'#D85A30'},
  {en:'purple',zh:'紫色',hex:'#7F77DD'},
  {en:'pink',zh:'粉紅',hex:'#D4537E'},
  {en:'white',zh:'白色',hex:'#e8e4de',border:true},
  {en:'black',zh:'黑色',hex:'#2C2C2A'},
  {en:'brown',zh:'棕色',hex:'#7a4f2e'},
];
const LEVELS=[
  {lv:1,choices:2,pick:1,time:8000,qs:6},
  {lv:2,choices:4,pick:1,time:7000,qs:6},
  {lv:3,choices:6,pick:1,time:6000,qs:6},
  {lv:4,choices:4,pick:2,time:8000,qs:5},
  {lv:5,choices:6,pick:2,time:8000,qs:5},
  {lv:6,choices:6,pick:3,time:12000,qs:5},
];
const ANIMALS=['🐶','🐱','🦁','🦍','🐸','🐼'];
const SW=['zero','one','two','three','four','five','six','seven','eight','nine','ten'];

/* ── State ── */
let lv=0,qi=0,total=0,lvScore=0,lvScores=[],answered=false,timerInt=null,selBtns=[],targets=[],fwTimer=null;
let muted=false,audioCtx=null;

/* ── Audio (Web Audio API) ── */
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq,dur,type,vol,delay){
  if(muted) return;
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,ctx.currentTime+(delay||0));
    g.gain.setValueAtTime(vol||0.3,ctx.currentTime+(delay||0));
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(delay||0)+dur);
    o.start(ctx.currentTime+(delay||0));
    o.stop(ctx.currentTime+(delay||0)+dur);
  }catch(e){}
}

function playNoise(dur,vol,delay){
  if(muted) return;
  try{
    const ctx=getAudioCtx();
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource();
    src.buffer=buf;
    const g=ctx.createGain();
    src.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(vol||0.15,ctx.currentTime+(delay||0));
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(delay||0)+dur);
    src.start(ctx.currentTime+(delay||0));
  }catch(e){}
}

/* Animal-specific sounds */
function playAnimalSound(animal,happy){
  if(muted) return;
  if(animal==='🦍'){
    if(happy){
      // Gorilla chest beat: low thumps
      [0,0.18,0.36,0.54,0.72].forEach(d=>{
        playTone(60,0.12,'square',0.4,d);
        playNoise(0.1,0.2,d);
      });
      // Happy roar
      playTone(120,0.4,'sawtooth',0.15,0.8);
      playTone(90,0.5,'sawtooth',0.12,1.0);
    } else {
      // Sad low growl
      playTone(80,0.6,'sawtooth',0.2,0);
      playTone(60,0.8,'sawtooth',0.15,0.5);
    }
  } else if(animal==='🦁'){
    if(happy){
      // Loud roar: sweep down
      playTone(400,0.15,'sawtooth',0.25,0);
      playTone(280,0.2,'sawtooth',0.25,0.15);
      playTone(180,0.3,'sawtooth',0.3,0.3);
      playTone(100,0.5,'sawtooth',0.25,0.55);
      playNoise(0.3,0.15,0.4);
    } else {
      // Sad whimper
      playTone(300,0.2,'sine',0.15,0);
      playTone(220,0.3,'sine',0.12,0.25);
      playTone(160,0.4,'sine',0.1,0.5);
    }
  } else if(animal==='🐶'){
    if(happy){
      // Bark bark!
      [0,0.22,0.44].forEach(d=>{
        playTone(520,0.08,'square',0.3,d);
        playTone(480,0.1,'square',0.25,d+0.08);
      });
    } else {
      // Whine
      playTone(600,0.15,'sine',0.15,0);
      playTone(500,0.2,'sine',0.12,0.2);
      playTone(400,0.25,'sine',0.1,0.4);
    }
  } else if(animal==='🐱'){
    if(happy){
      // Purr + meow
      playTone(440,0.12,'sine',0.2,0);
      playTone(520,0.15,'sine',0.2,0.15);
      playTone(480,0.12,'sine',0.18,0.3);
      playTone(560,0.1,'sine',0.2,0.45);
    } else {
      // Sad meow going down
      playTone(500,0.1,'sine',0.15,0);
      playTone(380,0.2,'sine',0.15,0.12);
      playTone(280,0.3,'sine',0.12,0.3);
    }
  } else if(animal==='🐸'){
    if(happy){
      // Ribbit ribbit
      [0,0.3,0.6].forEach(d=>{
        playTone(200,0.08,'square',0.3,d);
        playTone(250,0.06,'square',0.25,d+0.08);
      });
    } else {
      playTone(150,0.4,'sine',0.15,0);
      playTone(120,0.5,'sine',0.12,0.4);
    }
  } else if(animal==='🐼'){
    if(happy){
      // Cute squeaks
      [0,0.25,0.5].forEach(d=>{
        playTone(700,0.08,'sine',0.2,d);
        playTone(800,0.06,'sine',0.18,d+0.09);
      });
    } else {
      playTone(400,0.15,'sine',0.12,0);
      playTone(300,0.2,'sine',0.1,0.2);
      playTone(200,0.3,'sine',0.08,0.4);
    }
  }
}

/* Fireworks + crowd cheer sound */
function playFireworkSound(){
  if(muted) return;
  // Crowd cheer: noise burst + high freq shimmer
  function cheer(delay){
    playNoise(0.8,0.25,delay);
    // Shimmer
    for(let i=0;i<6;i++){
      playTone(800+Math.random()*800,0.15,'sine',0.04+Math.random()*0.04,delay+Math.random()*0.4);
    }
  }
  // Firework pop
  function pop(delay){
    playNoise(0.1,0.3,delay);
    for(let i=0;i<5;i++){
      const f=300+Math.random()*600;
      playTone(f,0.3,'sine',0.08,delay+0.05+Math.random()*0.15);
    }
  }
  cheer(0);cheer(1.2);cheer(2.5);
  [0.3,0.8,1.5,2.0,2.8,3.5].forEach(d=>pop(d));
}

function playCorrect(){
  if(muted) return;
  playTone(523,0.1,'sine',0.2,0);
  playTone(659,0.1,'sine',0.2,0.1);
  playTone(784,0.2,'sine',0.2,0.2);
}
function playWrong(){
  if(muted) return;
  playTone(300,0.15,'sawtooth',0.2,0);
  playTone(220,0.2,'sawtooth',0.15,0.15);
}
function playTick(){
  if(muted) return;
  playTone(1000,0.04,'square',0.08,0);
}

/* ── Mute ── */
function toggleMute(){
  muted=!muted;
  const btn=document.getElementById('mute-btn');
  btn.textContent=muted?'🔇 靜音':'🔊 聲音';
  btn.classList.toggle('muted',muted);
}

/* ── TTS ── */
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices();if(!voices.length)setTimeout(loadVoices,200);}
window.speechSynthesis.onvoiceschanged=loadVoices;loadVoices();
function getVoice(){const p=['Samantha','Google US English','en-US','en_US','en-GB'];for(let x of p){let v=voices.find(k=>k.name===x||k.voiceURI===x||(k.lang&&k.lang.startsWith(x)));if(v)return v;}return voices.find(v=>v.lang&&v.lang.startsWith('en'))||null;}
function speak(t,r,p,cb){
  if(muted){if(cb)setTimeout(cb,500);return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=r||0.82;u.pitch=p||1.15;u.volume=1;
  const v=getVoice();if(v)u.voice=v;
  if(cb)u.onend=cb;
  speechSynthesis.speak(u);
}
function speakTargets(cb){if(targets.length===1)speak(targets[0].en,0.82,1.15,cb);else speak(targets.map(c=>c.en).join(' and '),0.78,1.1,cb);}
function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}

/* ── Timer ── */
let lastTickSec=-1;
function startTimer(ms){
  clearInterval(timerInt);lastTickSec=-1;
  const bar=document.getElementById('timer-bar');
  bar.style.width='100%';bar.style.background='#7F77DD';
  const s=Date.now();
  timerInt=setInterval(()=>{
    if(answered)return;
    const e=Date.now()-s,p=Math.max(0,100-e/ms*100);
    bar.style.width=p+'%';
    bar.style.background=p<25?'#E24B4A':p<55?'#EF9F27':'#7F77DD';
    const secLeft=Math.ceil((ms-e)/1000);
    if(p<40&&secLeft!==lastTickSec){lastTickSec=secLeft;playTick();}
    if(e>=ms)doTimeout();
  },80);
}
function stopTimer(){clearInterval(timerInt);}

function doTimeout(){
  if(answered)return;answered=true;stopTimer();
  document.getElementById('feedback').textContent='⏰ 時間到！';
  document.getElementById('feedback').className='timeout';
  document.getElementById('confirm-btn').style.display='none';
  document.querySelectorAll('.cbtn').forEach(b=>{if(targets.find(c=>c.en===b.dataset.en))b.classList.add('reveal');});
  playWrong();
  speak('Time is up!',0.8,1.1,()=>setTimeout(nextQ,1200));
}

/* ── Game logic ── */
function speakNow(){
  const btn=document.getElementById('listen-btn');
  btn.classList.remove('pulse');void btn.offsetWidth;btn.classList.add('pulse');
  document.getElementById('color-word').textContent=targets.map(c=>c.en.toUpperCase()).join(' + ');
  speakTargets();
}

function buildGrid(){
  const L=LEVELS[lv];
  const others=shuffle(COLORS.filter(c=>!targets.find(t=>t.en===c.en))).slice(0,L.choices-targets.length);
  const opts=shuffle([...targets,...others]);
  const div=document.getElementById('choices');
  div.innerHTML='';
  div.style.gridTemplateColumns='repeat(2,1fr)';
  opts.forEach(c=>{
    const b=document.createElement('button');
    b.className='cbtn';b.dataset.en=c.en;
    b.style.background=c.hex;
    if(c.border)b.style.outline='3px solid #ccc';
    b.innerHTML='<span>'+c.zh+'</span>';
    if(L.pick===1)b.onclick=()=>answerSingle(c.en===targets[0].en,b,targets[0]);
    else b.onclick=()=>toggleSel(b);
    div.appendChild(b);
  });
}

function answerSingle(correct,btn,tgt){
  if(answered)return;answered=true;stopTimer();
  const fb=document.getElementById('feedback');
  if(correct){
    btn.classList.add('correct');fb.textContent='🎉 答對了！';fb.className='good';
    lvScore++;total++;playCorrect();
    speak('Correct! Great job!',0.88,1.2,()=>setTimeout(nextQ,900));
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.cbtn').forEach(b=>{if(b.dataset.en===tgt.en)b.classList.add('reveal');});
    fb.textContent='加油！繼續！';fb.className='bad';playWrong();
    speak('Try again!',0.88,1.1,()=>setTimeout(nextQ,1100));
  }
  document.getElementById('score-disp').textContent=total+' 分';
}

function toggleSel(btn){
  if(answered)return;
  const L=LEVELS[lv];
  if(btn.classList.contains('selected')){btn.classList.remove('selected');selBtns=selBtns.filter(b=>b!==btn);}
  else{if(selBtns.length>=L.pick)return;btn.classList.add('selected');selBtns.push(btn);}
  document.getElementById('confirm-btn').style.display=selBtns.length===L.pick?'block':'none';
}

function confirmMulti(){
  if(answered)return;answered=true;stopTimer();
  document.getElementById('confirm-btn').style.display='none';
  const sel=selBtns.map(b=>b.dataset.en);
  const ok=targets.every(t=>sel.includes(t.en))&&sel.length===targets.length;
  const fb=document.getElementById('feedback');
  if(ok){
    selBtns.forEach(b=>b.classList.add('correct'));
    fb.textContent='🎉 全對！太棒了！';fb.className='good';
    lvScore++;total++;playCorrect();
    speak('Excellent! All correct!',0.88,1.2,()=>setTimeout(nextQ,1000));
  }else{
    selBtns.forEach(b=>{b.classList.remove('selected');if(targets.find(t=>t.en===b.dataset.en))b.classList.add('correct');else b.classList.add('wrong');});
    document.querySelectorAll('.cbtn').forEach(b=>{if(targets.find(t=>t.en===b.dataset.en)&&!b.classList.contains('correct'))b.classList.add('missed');});
    fb.textContent='不對喔！再加油！';fb.className='bad';playWrong();
    speak('Not quite!',0.85,1.1,()=>setTimeout(nextQ,1300));
  }
  document.getElementById('score-disp').textContent=total+' 分';
}

function nextQ(){qi++;if(qi>=LEVELS[lv].qs){showResult();return;}loadQ();}
function skipLevel(){stopTimer();answered=true;selBtns=[];document.getElementById('confirm-btn').style.display='none';speechSynthesis.cancel();showResult();}

function loadQ(){
  answered=false;selBtns=[];
  document.getElementById('feedback').textContent='';
  document.getElementById('color-word').textContent='';
  document.getElementById('confirm-btn').style.display='none';
  const L=LEVELS[lv];
  document.getElementById('prog').textContent=(qi+1)+' / '+L.qs+'　第 '+L.lv+' 關';
  document.getElementById('level-badge').textContent='第 '+L.lv+' 關';
  document.getElementById('skip-btn').style.display=lv>=LEVELS.length-1?'none':'inline-block';
  document.getElementById('listen-btn').textContent='🔊 點我聽聲音！';
  targets=shuffle(COLORS).slice(0,L.pick);
  document.getElementById('hint').textContent=L.pick>1?'請選出 '+L.pick+' 個顏色！':'';
  buildGrid();
  document.getElementById('timer-bar').style.width='100%';

}

/* ── Result screen ── */
function showResult(){
  const L=LEVELS[lv];
  const passed=lvScore>=3;
  const animal=ANIMALS[lv];
  document.getElementById('game-screen').style.display='none';
  document.getElementById('result-screen').style.display='flex';
  drawAnimal(passed,animal);
  document.getElementById('result-msg').textContent=passed?'🎉 過關！':'😢 加油！';
  document.getElementById('result-sub').textContent='第 '+L.lv+' 關答對 '+lvScore+' / '+L.qs+' 題';
  document.getElementById('next-lv-btn').textContent=lv>=LEVELS.length-1?'查看成績 🏆':'下一關 ▶';
  const sw=n=>SW[n]||String(n);
  const msg=passed?'You got '+sw(lvScore)+' out of '+sw(L.qs)+'! Great job!':'You got '+sw(lvScore)+' out of '+sw(L.qs)+'. Keep trying!';
  playAnimalSound(animal,passed);
  speak(msg,0.82,passed?1.2:1.0);
}

function retryLevel(){
  lvScore=0;qi=0;answered=false;selBtns=[];
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('feedback').textContent='';
  loadQ();
}

function goNextLevel(){
  lvScores[lv]=lvScore;
  if(lv>=LEVELS.length-1){showFinal();return;}
  lv++;lvScore=0;qi=0;answered=false;selBtns=[];
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('feedback').textContent='';
  speak('Level '+(lv+1)+"! Let's go!",0.9,1.2,()=>setTimeout(loadQ,400));
  loadQ();
}

/* ── Final screen ── */
function showFinal(){
  lvScores[lv]=lvScores[lv]!==undefined?lvScores[lv]:lvScore;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('final-screen').style.display='flex';
  const tbody=document.getElementById('score-tbody');tbody.innerHTML='';
  let g=0,gq=0;
  LEVELS.forEach((L,i)=>{
    const s=lvScores[i]||0;g+=s;gq+=L.qs;
    const tr=document.createElement('tr');
    tr.innerHTML='<td>第 '+L.lv+' 關 '+ANIMALS[i]+'</td><td>'+s+'</td><td>'+L.qs+'</td>';
    tbody.appendChild(tr);
  });
  const tr=document.createElement('tr');
  tr.innerHTML='<td>合計</td><td>'+g+'</td><td>'+gq+'</td>';
  tbody.appendChild(tr);
  startFW();
  playFireworkSound();
  speak('Congratulations! You finished all six levels!',0.85,1.15);
}

function startFW(){
  clearInterval(fwTimer);
  const cv=document.getElementById('fw-canvas');
  const ctx=cv.getContext('2d');
  const W=cv.offsetWidth,H=180;
  cv.width=W*2;cv.height=H*2;ctx.scale(2,2);
  const pts=[],cols=['#FFD700','#FF69B4','#7F77DD','#1D9E75','#E24B4A','#EF9F27','#378ADD','#fff','#5DCAA5'];
  function ex(x,y){for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2,s=Math.random()*4.5+1;pts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*3+1});}}
  let t=0;
  fwTimer=setInterval(()=>{
    ctx.fillStyle='rgba(26,16,64,0.18)';ctx.fillRect(0,0,W,H);
    if(t%22===0){ex(Math.random()*W*0.8+W*0.1,Math.random()*H*0.55+15);if(!muted&&t>0) playNoise(0.08,0.15,0);}
    for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.life-=0.02;if(p.life<=0){pts.splice(i,1);continue;}ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;t++;
  },30);
}

/* ── Start ── */
function startGame(){
  clearInterval(fwTimer);
  lv=0;qi=0;total=0;lvScore=0;lvScores=[];answered=false;selBtns=[];
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('final-screen').style.display='none';
  document.getElementById('score-disp').textContent='0 分';
  document.getElementById('skip-btn').style.display='inline-block';
  loadQ();
}

startGame();
